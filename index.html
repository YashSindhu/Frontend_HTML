      <form action="" method="">
        <label for="name">UserName</label>
        <input type="text" id="name" name="user" required  placeholder="Enter UserName" minlength="5" maxlength="10" disabled>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="Enter Email">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter password">
        <br><br><hr>
        <br>
        <input type="file">
        <br><br><hr><br>

        <label for="Subject"> Subjects</label>
        <br><hr>

        <input type="checkbox">
        <label for="">HTML</label><br>
        <input type="checkbox" checked>
        <label for="">CSS</label><br>
        <input type="checkbox">
        <label for="">JS</label><br>
        <br>

        <label for="Gender">Gender</label>
        <br>

        <label for="">Male</label>
        <input type="radio" name="Gender" value="Male" id="" /><br>
        <label for="">Female</label>
        <input type="radio" name="Gender" value="Female" id="" /><br>
        <br><br><hr>

        <br><br>
        <label for="">Passout Date</label>
        <input type="date" min="2025-01-01" max="2026-04-02">
        <hr>

        <br><br>
        <select name="" id="">
            <option value="">None</option>
            <optgroup label="Web-Tech"></optgroup>
                <option value="">HTML</option>
                <option value="">CSS</option>

                <option value="">TS</option>
            </optgroup>
            <optgroup label="Frameworks"></optgroup>
                <option value="">React</option>
                <option value="">Angular</option>

            </optgroup>

        <input type="submit" value="Submit" >
